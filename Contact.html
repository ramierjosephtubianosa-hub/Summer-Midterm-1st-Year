<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url("Contact.jpg");
            background-repeat: no-repeat;
            background-size: cover;                               
            background-color: #f4f4f4;
            margin: 40px;
        }
     
nav {
    background-color: #2c3e50;
    text-align: center;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 30px;
}
nav a {
    color: #ffffff;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;
    transition: color 0.3s ease;
}
nav a:hover {
    color: #b98b0c;
}
.container {
            width: 400px;
            margin: auto;
            background: rgb(255, 255, 255);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #02203f;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #b37a00;
        }
    </style>
</head>
     <nav>
        <a href="index.html">Home Page</a>
        <a href="profile.html">About Me</a>
        <a href="Personal Data.html">View Profile</a>
     </nav>
<body>

<div class="container">
    <h2>Contact Me</h2>

    <form action="#" method="post">

        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit"><a href="mailto:ramierjosephtubianosa@student.trimexcolleges.edu.ph@gmail.com">Send Message</a></button>

    </form>
</div>

</body>
</html>
